<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retreats & Workshops — The Relational School</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --clay: #B8845C;
  --clay-light: #D4A574;
  --earth: #3D2B1F;
  --earth-soft: #5C4033;
  --cream: #F5EDE4;
  --gold-thread: #C9A96E;
  --gold-glow: rgba(201, 169, 110, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--earth);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  background:
    radial-gradient(ellipse at 30% 70%, rgba(139, 158, 124, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 30%, rgba(184, 132, 92, 0.07) 0%, transparent 50%),
    var(--cream);
}

.container {
  max-width: 500px;
}

.badge {
  display: inline-block;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--clay);
  border: 1px solid var(--clay-light);
  padding: 0.4rem 1.2rem;
  border-radius: 100px;
  margin-bottom: 2rem;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(2.2rem, 6vw, 3.5rem);
  line-height: 1.1;
  color: var(--earth);
  margin-bottom: 1rem;
}

h1 em {
  color: var(--clay);
  font-style: italic;
  font-weight: 400;
}

p {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  color: var(--earth-soft);
  line-height: 1.7;
  margin-bottom: 2rem;
}

.gold-line {
  width: 40px;
  height: 2px;
  background: var(--gold-thread);
  margin: 0 auto 2rem;
  border-radius: 1px;
}

.back-link {
  display: inline-block;
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--earth-soft);
  text-decoration: none;
  padding: 0.7rem 1.5rem;
  border: 1px solid var(--clay-light);
  border-radius: 100px;
  transition: all 0.3s;
}

.back-link:hover {
  color: var(--earth);
  background: var(--gold-glow);
  border-color: var(--gold-thread);
}
</style>
</head>
<body>

<div class="container">
  <span class="badge">Coming Soon</span>
  <h1>Retreats & <em>Workshops</em></h1>
  <div class="gold-line"></div>
  <p>Multi-day Pattern Break intensives, immersive experiences, and deeper containers for transformation. These emerge organically throughout the year — sign up for updates to know when something's coming.</p>
  <a href="/therelationalschool/patternbreak/" class="back-link">← Back to Pattern Break</a>
</div>

</body>
</html>
